{% extends 'recommender/master.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5 wow fadeInDown" data-wow-delay="0.1s">
        <h2 class="text-uppercase mb-0"><i class="fa-solid fa-bookmark text-primary me-2"></i> My Watchlist</h2>
        <span id="watchlist-count" class="badge bg-primary">0 Movies</span>
    </div>

    <div id="watchlist-grid" class="row">
        </div>

    <div id="empty-msg" class="text-center py-5 d-none wow fadeInUp" data-wow-delay="0.2s">
        <i class="fa-solid fa-clapperboard fa-4x mb-3 opacity-25"></i>
        <p class="text-muted">Your watchlist is empty. Go to 'All Movies' to add some!</p>
        <a href="/all-movies/" class="btn btn-outline-primary mt-3">Browse Movies</a>
    </div>
</div>
<script src="{% static 'recommender/js/movie-list.js' %}"></script>
{% endblock %}
