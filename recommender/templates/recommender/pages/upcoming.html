{% extends 'recommender/master.html' %}
{% block content %}
<div class="container text-center py-5">
    <h1 class="text-uppercase mb-4 wow fadeInDown" data-wow-delay="0.1s">
        <i class="fa-solid fa-calendar-days text-primary me-2"></i> Upcoming 2026
    </h1>
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <ul class="list-group list-group-flush text-start">
                {% for id, movie in movies.items %}
                    <li class="list-group-item bg-dark d-flex justify-content-between align-items-center py-3 wow fadeInUp" data-wow-delay="0.2s">
                        <span><strong>{{ movie.title }}</strong> ({{ movie.year }})</span>
                        <span class="badge bg-primary rounded-pill">{{ movie.status }}</span>
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
{% endblock %}
